      :root {
        color-scheme: light;
        --page-bg: #dfe3e3;
        --bg: #eef1f0;
        --ink: #15436b;
        --on-ink: #ffffff;
        --text: #2a2f34;
        --text-strong: #263238;
        --heading: #525b62;
        --icon: #304653;
        --bar: #ffffff;
        --line: #e2e6e6;
        --line-soft: #eef1f1;
        --muted: #6a7078;
        --soft: #f6f8f8;
        --soft-strong: #e9eff1;
        --focus: #c2d9e6;
        --button-border: #cfd5d5;
        --button-text: #5a6066;
        --hover: #f2f5f5;
        --primary-hover: #edf4f7;
        --active-bg: #e8f1f6;
        --active-border: #9dc6d9;
        --panel-hover: #f9fbfb;
        --input-bg: #ffffff;
        --input-border: #d2d9d9;
        --input-focus-border: #a9c7d7;
        --resizer: #8eb8cc;
        --timeline-dot-outline: #ffffff;
        --count-text: #54616a;
        --empty-border: #d3dbdb;
        --chart-shadow: 0 8px 30px rgba(20, 40, 60, 0.12);
        --table-page: #f7f8f7;
        --table-bg: #ffffff;
        --table-line: #d9dfdf;
        --table-cell-line: #edf0f0;
        --table-head: #edf2f3;
        --table-head-text: #34414a;
        --table-active: #eef6fa;
        --table-hover: #f8fbfc;
        --table-active-hover: #e8f3f8;
        --table-link: #155f8d;
        --toolbar-height: 52px;
        --sidebar-width: 282px;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --page-bg: #1d1e1c;
        --bg: #151716;
        --ink: #6fd3c4;
        --on-ink: #10201d;
        --text: #e6e3d8;
        --text-strong: #f1eee5;
        --heading: #d1d5cb;
        --icon: #c8d2c8;
        --bar: #232321;
        --line: #393b37;
        --line-soft: #30332f;
        --muted: #a4aaa4;
        --soft: #2b2d2a;
        --soft-strong: #343832;
        --focus: #6fd3c4;
        --button-border: #464a43;
        --button-text: #c4cbc1;
        --hover: #30332f;
        --primary-hover: #253d38;
        --active-bg: #203c38;
        --active-border: #4b9087;
        --panel-hover: #282b27;
        --input-bg: #1b1d1a;
        --input-border: #464a43;
        --input-focus-border: #74cfc3;
        --resizer: #63b6ad;
        --timeline-dot-outline: #232321;
        --count-text: #c3cbbb;
        --empty-border: #4a5046;
        --chart-shadow: 0 10px 34px rgba(0, 0, 0, 0.38);
        --table-page: #1a1b19;
        --table-bg: #232321;
        --table-line: #393b37;
        --table-cell-line: #343730;
        --table-head: #30342e;
        --table-head-text: #e1e6da;
        --table-active: #203c38;
        --table-hover: #2a2d29;
        --table-active-hover: #254842;
        --table-link: #7fd9cd;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        background: var(--page-bg);
        font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
      }
      .top-shell {
        position: sticky; top: 0; z-index: 10;
        background: var(--bar);
      }
      .toolbar,
      .actionbar {
        display: flex; align-items: center; gap: 8px;
        background: var(--bar);
      }
      .toolbar {
        height: 24px; min-height: 24px; padding: 0 8px;
      }
      .toolbar {
        border-bottom: 1px solid var(--line-soft);
      }
      .actionbar {
        height: 28px; min-height: 28px; padding: 2px 8px;
        border-bottom: 1px solid var(--line);
      }
      .toolbar h1 {
        flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-size: 12.5px; line-height: 24px; font-weight: 400; margin: 0 2px 0 0; color: var(--ink);
      }
      .toolbar a {
        color: var(--ink); text-decoration: none;
      }
      .toolbar a:hover { text-decoration: underline; }
      .byline {
        flex: 0 0 auto; white-space: nowrap;
        color: var(--muted); font-size: 11.5px; line-height: 24px; font-weight: 400;
      }
      .repo-link {
        flex: 0 0 24px; width: 24px; height: 24px;
        display: inline-flex; align-items: center; justify-content: center;
        color: var(--icon); font-size: 11.5px; line-height: 24px; font-weight: 400;
      }
      .repo-link svg {
        width: 13px; height: 13px; flex: 0 0 auto; fill: currentColor;
      }
      .repo-link:hover { background: var(--hover); text-decoration: none; }
      .action-title {
        min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        color: var(--heading); font-size: 12px; font-weight: 400;
      }
      .view-seg { align-self: stretch; flex: 0 0 auto; gap: 1px; height: 24px; }
      .seg { display: inline-flex; border: 1px solid var(--button-border); overflow: hidden; }
      .seg button { border: 0; border-right: 1px solid var(--button-border); background: var(--input-bg); padding: 2px 10px; height: 22px; font: inherit; font-size: 12px; font-weight: 400; color: var(--button-text); cursor: pointer; }
      .seg button:last-child { border-right: 0; }
      .seg button.active { background: var(--ink); color: var(--on-ink); }
      .view-seg.seg { border: 0; }
      .view-seg button {
        height: 24px; padding: 0 10px; border: 0; background: transparent;
        color: var(--button-text); line-height: 24px;
      }
      .view-seg button.active {
        background: var(--ink); color: var(--on-ink);
      }
      .seg.compact button { padding: 2px 8px; font-size: 11px; height: 22px; }
      .toolbar-actions,
      .action-group,
      .utility-controls { display: inline-flex; align-items: center; gap: 8px; }
      .utility-controls { flex: 0 0 auto; margin-left: auto; }
      [hidden] { display: none !important; }
      .btn {
        height: 22px; font: inherit; font-size: 12px; font-weight: 400; padding: 2px 7px;
        border: 1px solid transparent; background: transparent; color: var(--text); cursor: pointer;
        display: inline-flex; align-items: center; gap: 5px;
      }
      .btn svg { width: 12px; height: 12px; stroke-width: 2; }
      .btn:hover { background: var(--hover); border-color: transparent; }
      .btn.primary { color: var(--ink); border-color: transparent; }
      .btn.primary:hover { background: var(--primary-hover); }
      .icon-btn {
        width: 22px; height: 22px; padding: 0; justify-content: center; flex: 0 0 auto;
      }
      .icon-btn svg { width: 14px; height: 14px; }
      .utility-btn {
        min-width: 48px;
        justify-content: center;
      }
      .utility-btn span {
        min-width: 18px;
        text-align: center;
        font-size: 11px;
        font-weight: 800;
      }
      .spacer { flex: 1; }

      .app {
        display: grid;
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr);

      .item-top { display: flex; align-items: center; gap: 6px; min-width: 0; height: 22px; }

      .company-item .item-name { max-width: 46%; }
      .period-item {
        --timeline-color: #8e9aa1;

        min-height: 30px; padding: 0; border-color: transparent; background: transparent;

        "factory": "<path d=\"M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z\" /> <path d=\"M17 18h1\" /> <path d=\"M12 18h1\" /> <path d=\"M7 18h1\" />",
        "cloud": "<path d=\"M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z\" />",
        "dollar": "<path d=\"M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z\" /> <path d=\"M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8\" /> <path d=\"M12 18V6\" />",

      window.SANKEY_BRAND = {
        // single fill path, 0..24 viewBox
        nvidia: "M8.948 8.798v-1.43a6.7 6.7 0 0 1 .424-.018c3.922-.124 6.493 3.374 6.493 3.374s-2.774 3.851-5.75 3.851c-.398 0-.787-.062-1.158-.185v-4.346c1.528.185 1.837.857 2.747 2.385l2.04-1.714s-1.492-1.952-4-1.952a6.016 6.016 0 0 0-.796.035m0-4.735v2.138l.424-.027c5.45-.185 9.01 4.47 9.01 4.47s-4.08 4.964-8.33 4.964c-.37 0-.733-.035-1.095-.097v1.325c.3.035.61.062.91.062 3.957 0 6.82-2.023 9.593-4.408.459.371 2.34 1.263 2.73 1.652-2.633 2.208-8.772 3.984-12.253 3.984-.335 0-.653-.018-.971-.053v1.864H24V4.063zm0 10.326v1.131c-3.657-.654-4.673-4.46-4.673-4.46s1.758-1.944 4.673-2.262v1.237H8.94c-1.528-.186-2.73 1.245-2.73 1.245s.68 2.412 2.739 3.11M2.456 10.9s2.164-3.197 6.5-3.533V6.201C4.153 6.59 0 10.653 0 10.653s2.35 6.802 8.948 7.42v-1.237c-4.84-.6-6.492-5.936-6.492-5.936z"
      };
    </script>
    <script data-inline-source="src/sankey-engine.js">
      /* ====================================================================
       *  sankey-engine.js
       *  A reusable income-statement Sankey renderer (D3 + d3-sankey).
       *
       *  Feed it a data object (see data/schema.md) and it draws a polished
       *  flow diagram in the style of the NVIDIA income-statement infographic:
       *  green = value retained, red = costs, teal = revenue collection.
       *
       *  Public API:
       *      SankeyEngine.render(selector, data, overrides?)
       * ==================================================================== */
      (function (global) {
        'use strict';

        /* ---- default theme / layout tokens (override per-call via 4th arg) ---- */
        const DEFAULTS = {
          width: 2862,
          height: 1462,
          margin: { top: 360, right: 311, bottom: 351, left: 339 },

          nodeWidth: 82,
          nodePadding: 104,

          background: '#efefef',
          fontFamily:
            '"Montserrat","Poppins",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif',

          titleColor: '#123e65',
          subtitleColor: '#535353',
          noteColor: '#535353',

          // solid node colours, keyed by node.type. label = text colour.
          palette: {
            source: { node: '#0e7451', label: '#008966' },
            hub: { node: '#101010', label: '#101010' },
            profit: { node: '#289321', label: '#008f47' },
            cost: { node: '#be0004', label: '#800003' },
          },

          // translucent link tints, keyed by category. hub returns null so a
          // link passing through the hub keeps the colour of its other end.
          linkTint: {
            source: '#88b7a3',
            hub: null,
            profit: '#93c68b',
            cost: '#e99485',
          },
          linkOpacity: 1,

          // typography (px) for the multi-line node labels
          type: { name: 46, value: 43, note: 31, lineGap: 8 },

          interaction: {
            enabled: true,
            dimOpacity: 0.16,
            nodeDimOpacity: 0.22,
            labelDimOpacity: 0.2,
            focusOpacity: 1,
            transitionMs: 120,
            tooltip: {
              enabled: true,
              percentDecimals: 1,
              fontSize: 28,
              fontWeight: 600,
              textColor: '#35566f',
              background: '#f8fbfc',
              backgroundOpacity: 0.88,
              stroke: '#d9e3e8',
              strokeOpacity: 0.65,
              paddingX: 14,
              paddingY: 8,
              radius: 4,
            },
          },
        };

        /* ---------------------------- helpers ---------------------------- */
        const isFn = (v) => typeof v === 'function';

        function deepMerge(base, extra) {
          if (!extra) return base;
          const out = Array.isArray(base) ? base.slice() : Object.assign({}, base);
          for (const k of Object.keys(extra)) {
            const a = out[k];
            const b = extra[k];
            out[k] =
              a && b && typeof a === 'object' && typeof b === 'object' && !Array.isArray(b)
                ? deepMerge(a, b)
                : b;
          }
          return out;
        }

        // "$37.9B"  /  cost → "($20.5B)"
        // NB: d3-sankey overwrites node.value with the computed flow sum, so the
        // display number is read from node.dv (the author's original value).
        function formatValue(node, meta) {
          if (node.valueText != null) return node.valueText;
          const cur = meta.currency != null ? meta.currency : '$';
          const unit = meta.unit != null ? meta.unit : '';
          const v = Math.abs(node.dv != null ? node.dv : node.value);
          const num = Number.isInteger(v) ? v : v.toFixed(meta.decimals != null ? meta.decimals : 1);
          const body = `${cur}${num}${unit}`;
          return node.type === 'cost' ? `(${body})` : body;
        }

        function trimFixed(value, decimals) {
          return value
            .toFixed(decimals)
            .replace(/\.0+$/, '')
            .replace(/(\.\d*?)0+$/, '$1');
        }

        // default label side when a node doesn't specify one
        function autoSide(node, nCols) {
          if (node.col === 0) return 'left';
          if (node.col === nCols - 1) return 'right';
          if (node.type === 'cost') return 'below';
          return 'above';
        }

        function buildFixedGraph(nodes, links, data, cfg) {
          const layout = data.layout || {};
          const fixed = layout.nodes || {};
          const scale =
            layout.scale ||
            nodes.reduce((best, n) => {
              const spec = fixed[n.id];
              return spec && n.value ? Math.min(best, spec.height / n.value) : best;
            }, Infinity);
          const ky = Number.isFinite(scale) ? scale : 1;

          const graphNodes = nodes.map((n) => {
            const spec = fixed[n.id] || {};
            const x0 = spec.x != null ? spec.x : cfg.margin.left + (n.col || 0) * 426;
            const y0 = spec.y != null ? spec.y : cfg.margin.top;
            const width = spec.width != null ? spec.width : cfg.nodeWidth;
            const height = spec.height != null ? spec.height : (n.value || 1) * ky;
            return Object.assign({}, n, {
              x0,
              y0,
              x1: x0 + width,
              y1: y0 + height,
              sourceLinks: [],
              targetLinks: [],
            });
          });

          const byId = new Map(graphNodes.map((n) => [n.id, n]));
          const graphLinks = links.map((l, i) => {
            const source = byId.get(l.raw.source);
            const target = byId.get(l.raw.target);
            const width = l.raw.width != null ? l.raw.width : l.value * ky;
            const link = Object.assign({}, l, { index: i, source, target, width });
            source.sourceLinks.push(link);
            target.targetLinks.push(link);
            return link;
          });

          const sortLinks = (a, b, key) => {
            const av = a.raw[key] != null ? a.raw[key] : a.index;
            const bv = b.raw[key] != null ? b.raw[key] : b.index;
            return av - bv;
          };
          graphNodes.forEach((n) => {
            n.sourceLinks.sort((a, b) => sortLinks(a, b, 'sourceOrder'));
            n.targetLinks.sort((a, b) => sortLinks(a, b, 'targetOrder'));
            let sy = n.y0;
            n.sourceLinks.forEach((l) => {
              l.y0 = sy + l.width / 2;
              sy += l.width;
            });
            let ty = n.y0;
            n.targetLinks.forEach((l) => {
              l.y1 = ty + l.width / 2;
              ty += l.width;
            });
          });

          graphLinks.forEach((l) => {
            if (l.raw.y0 != null) l.y0 = l.raw.y0;
            if (l.raw.y1 != null) l.y1 = l.raw.y1;
          });

          return { nodes: graphNodes, links: graphLinks };
        }

        /* ------------------------------ render --------------------------- */
        function render(selector, data, overrides) {
          if (!global.d3 || !global.d3.sankey) {
            throw new Error('d3 and d3-sankey must be loaded before sankey-engine.js');
          }
          const d3 = global.d3;
          const cfg = deepMerge(deepMerge(DEFAULTS, data.render || {}), overrides);
          const meta = data.meta || {};
          const ICONS = global.SANKEY_ICONS || {};

          const root = d3.select(selector);
          root.selectAll('*').remove();

          const W = cfg.width;
          const H = cfg.height;

          const svg = root
            .append('svg')
            .attr('viewBox', `0 0 ${W} ${H}`)
            .attr('preserveAspectRatio', 'xMidYMid meet')
            .attr('width', '100%')
            .style('display', 'block')
            .style('font-family', cfg.fontFamily);

          svg
            .append('rect')
            .attr('x', 0)
            .attr('y', 0)
            .attr('width', W)
            .attr('height', H)
            .attr('fill', cfg.background);

          const defs = svg.append('defs');

          /* ---------- build the graph for d3-sankey ---------- */
          const nodeById = new Map();
          const nodes = data.nodes.map((n, i) => {
            const copy = Object.assign({}, n, { index: i });
            nodeById.set(n.id, copy);
            return copy;
          });
          const nCols = 1 + nodes.reduce((m, n) => Math.max(m, n.col || 0), 0);

          const links = data.links.map((l) => ({
            source: nodeById.get(l.source).index,
            target: nodeById.get(l.target).index,
            value: l.value,
            raw: l,
          }));

          let graph;
          if (data.layout && data.layout.nodes) {
            graph = buildFixedGraph(nodes, links, data, cfg);
          } else {
            const sankey = d3
              .sankey()
              .nodeWidth(cfg.nodeWidth)
              .nodePadding(cfg.nodePadding)
              .nodeAlign((n) => (n.col != null ? n.col : n.depth)) // honour manual columns
              .nodeSort((a, b) => (a.order || 0) - (b.order || 0)) // honour manual vertical order
              // stack links in node order at both ends → no needless crossings
              .linkSort(
                (a, b) =>
                  (a.source.order || 0) - (b.source.order || 0) ||
                  (a.target.order || 0) - (b.target.order || 0)
              )
              .extent([
                [cfg.margin.left, cfg.margin.top],
                [W - cfg.margin.right, H - cfg.margin.bottom],
              ]);

            graph = sankey({
              nodes: nodes.map((d) => Object.assign({}, d)),
              links: links.map((d) => Object.assign({}, d)),
            });
          }

          // preserve the author's display value (sankey overwrites .value)
          const authoredValue = new Map(data.nodes.map((n) => [n.id, n.value]));
          graph.nodes.forEach((n) => {
            n.dv = authoredValue.has(n.id) ? authoredValue.get(n.id) : n.value;
          });

          /* ---------- colour resolvers ---------- */
          const nodeColor = (n) =>
            n.color || (cfg.palette[n.type] || cfg.palette.source).node;
          const labelColor = (n) =>
            n.labelColor || (cfg.palette[n.type] || cfg.palette.source).label;
          const tintOf = (n) => {
            if (n.linkTint) return n.linkTint;
            const t = cfg.linkTint[n.type];
            return t === undefined ? cfg.linkTint.source : t;
          };
          const keyOf = (n) => String(n.id != null ? n.id : n.index);

          /* ---------- links (drawn first, under the nodes) ---------- */
          const linkLayer = svg.append('g').attr('class', 'links');
          const sankeyLinkPath = d3.sankeyLinkHorizontal();

          function linkPath(lk) {
            const curve = lk.raw && lk.raw.curve;
            if (!curve) return sankeyLinkPath(lk);
            const x0 = curve.x0 != null ? curve.x0 : lk.source.x1;
            const x1 = curve.x1 != null ? curve.x1 : lk.target.x0;
            const c1x = curve.c1x != null ? curve.c1x : (x0 + x1) / 2;
            const c2x = curve.c2x != null ? curve.c2x : (x0 + x1) / 2;
            const c1y = curve.c1y != null ? curve.c1y : lk.y0;
            const c2y = curve.c2y != null ? curve.c2y : lk.y1;
            return `M${x0},${lk.y0}C${c1x},${c1y},${c2x},${c2y},${x1},${lk.y1}`;
          }

          graph.links.forEach((lk, i) => {
            const sNode = lk.source;
            const tNode = lk.target;
            // a flow leaving as a cost is solid salmon from the start, so it reads
            // as clearly distinct from the green profit bands at the split point
            const toCost = tNode.type === 'cost';
            const leftTint = toCost
              ? cfg.linkTint.cost
              : tintOf(sNode) || tintOf(tNode) || cfg.linkTint.source;
            const rightTint = toCost
              ? cfg.linkTint.cost
              : tintOf(tNode) || tintOf(sNode) || cfg.linkTint.source;

            const gid = `lg-${i}`;
            const grad = defs
              .append('linearGradient')
              .attr('id', gid)
              .attr('gradientUnits', 'userSpaceOnUse')
              .attr('x1', sNode.x1)
              .attr('x2', tNode.x0);
            grad.append('stop').attr('offset', '0%').attr('stop-color', leftTint);
            grad.append('stop').attr('offset', '100%').attr('stop-color', rightTint);

            linkLayer
              .append('path')
              .datum(lk)
              .attr('class', 'sankey-link')
              .attr('data-source', keyOf(sNode))
              .attr('data-target', keyOf(tNode))
              .attr('d', linkPath(lk))
              .attr('fill', 'none')
              .attr('stroke', `url(#${gid})`)
              .attr('stroke-width', Math.max(1, lk.width))
              .attr('stroke-opacity', cfg.linkOpacity)
              .attr('stroke-linecap', 'butt')
              .style('pointer-events', 'stroke')
              .style('cursor', 'pointer');
          });

          /* ---------- nodes ---------- */
          const nodeLayer = svg.append('g').attr('class', 'nodes');

          graph.nodes.forEach((n) => {
            nodeLayer
              .append('rect')
              .datum(n)
              .attr('class', 'sankey-node')
              .attr('data-node', keyOf(n))
              .attr('x', n.x0)
              .attr('y', n.y0)
              .attr('width', n.x1 - n.x0)
              .attr('height', Math.max(1, n.y1 - n.y0))
              .attr('fill', nodeColor(n))
              .attr('rx', 1.5)
              .style('cursor', 'pointer');
          });

          /* ---------- labels ---------- */
          const labelLayer = svg.append('g').attr('class', 'labels');

          const pad = 16;
          const gap = cfg.type.lineGap;
          const labelLayout = (data.layout && data.layout.labels) || {};
          const iconLayout = [];

          function customLines(n, block) {
            if (block.lines) {
              return block.lines.map((line) => {
                const spec = typeof line === 'string' ? { text: line } : line;
                const text = spec.text === '$value' ? formatValue(n, meta) : spec.text;
                return {
                  t: text,
                  size: spec.size || cfg.type.note,
                  w: spec.weight || spec.w || 400,
                  c: spec.color || labelColor(n),
                };
              });
            }
            const parts = block.parts || ['name', 'value', 'notes'];
            const out = [];
            const nameLines = Array.isArray(n.label) ? n.label : n.label ? [n.label] : [];
            const nameSize = block.nameSize || cfg.type.name;
            const valueSize = block.valueSize || cfg.type.value;
            const noteSize = block.noteSize || cfg.type.note;
            parts.forEach((part) => {
              if (part === 'name') {
                nameLines.forEach((t) =>
                  out.push({
                    t,
                    size: nameSize,
                    w: block.nameWeight || 700,
                    c: block.nameColor || labelColor(n),
                  })
                );
              } else if (part === 'value' && (n.value != null || n.valueText != null)) {
                out.push({
                  t: formatValue(n, meta),
                  size: valueSize,
                  w: block.valueWeight || 400,
                  c: block.valueColor || labelColor(n),
                });
              } else if (part === 'notes') {
                (n.notes || []).forEach((nt) =>
                  out.push({
                    t: nt,
                    size: noteSize,
                    w: block.noteWeight || 400,
                    c: block.noteColor || cfg.noteColor,
                  })
                );
              }
            });
            return out;
          }

          // ---- pass 1: build a label spec per node ----
          const specs = [];
          graph.nodes.forEach((n) => {
            const side = n.labelSide || autoSide(n, nCols);
            const cx = (n.x0 + n.x1) / 2;
            const cy = (n.y0 + n.y1) / 2;
            const custom = labelLayout[n.id];
            if (custom && custom.blocks) {
              custom.blocks.forEach((block) => {
                const lines = customLines(n, block);
                if (!lines.length) return;
                const localGap = block.lineGap != null ? block.lineGap : gap;
                const blockH =
                  lines.reduce((a, l) => a + l.size, 0) + localGap * (lines.length - 1);
                specs.push({
                  n,
                  side: 'custom',
                  cx,
                  anchor: block.anchor || 'middle',
                  x: block.x,
                  lines,
                  blockH,
                  top: block.top,
                  lineGap: localGap,
                  drawIcons: false,
                });
              });
              if (custom.icons) {
                iconLayout.push(Object.assign({ n }, custom.icons));
              }
              return;
            }

            const nameLines = Array.isArray(n.label) ? n.label : n.label ? [n.label] : [];
            const valueLines = [];
            if (n.value != null || n.valueText != null)
              valueLines.push({ t: formatValue(n, meta), size: cfg.type.value, w: 400, c: labelColor(n) });
            (n.notes || []).forEach((nt) =>
              valueLines.push({ t: nt, size: cfg.type.note, w: 400, c: cfg.noteColor })
            );
            if (side === 'split-left') {
              const nameOnly = nameLines.map((t) => ({
                t,
                size: cfg.type.name,
                w: 700,
                c: labelColor(n),
              }));
              const nameH =
                nameOnly.reduce((a, l) => a + l.size, 0) + gap * Math.max(0, nameOnly.length - 1);
              const valueH =
                valueLines.reduce((a, l) => a + l.size, 0) + gap * Math.max(0, valueLines.length - 1);
              specs.push({
                n,
                side: 'split-name',
                cx,
                anchor: 'end',
                x: n.x0 - 42,
                lines: nameOnly,
                blockH: nameH,
                top: cy - nameH / 2,
                drawIcons: false,
              });
              specs.push({
                n,
                side: 'split-value',
                cx,
                anchor: 'middle',
                x: cx,
                lines: valueLines,
                blockH: valueH,
                top: n.y0 - 35 - valueH,
                drawIcons: false,
              });
              return;
            }

            // lines: name (bold, may wrap), value (regular), notes (gray)
            const lines = [];
            nameLines.forEach((t) =>
              lines.push({ t, size: cfg.type.name, w: 700, c: labelColor(n) })
            );
            valueLines.forEach((l) => lines.push(l));
            if (!lines.length) return;

            const blockH = lines.reduce((a, l) => a + l.size, 0) + gap * (lines.length - 1);

            let anchor, x, top;
            if (side === 'left') {
              anchor = 'end';
              x = n.x0 - pad;
              top = cy - blockH / 2;
            } else if (side === 'right') {
              anchor = 'start';
              x = n.x1 + pad;
              top = cy - blockH / 2;
            } else if (side === 'below') {
              anchor = 'middle';
              x = cx;
              top = n.y1 + pad + 4;
            } else {
              // above — block sits fully above the node top
              anchor = 'middle';
              x = cx;
              top = n.y0 - pad - blockH;
            }
            specs.push({ n, side, cx, anchor, x, lines, blockH, top, drawIcons: true });
          });

          // ---- pass 2: keep side labels from overlapping (push later ones down) ----
          const minGap = 11;
          ['left', 'right'].forEach((s) => {
            const grp = specs.filter((sp) => sp.side === s).sort((a, b) => a.top - b.top);
            for (let i = 1; i < grp.length; i++) {
              const need = grp[i - 1].top + grp[i - 1].blockH + minGap;
              if (grp[i].top < need) grp[i].top = need;
            }
          });

          // ---- pass 3: render text + optional icons ----
          specs.forEach((sp) => {
            const { n, side, cx, anchor, x, lines, blockH, top } = sp;
            n._labelTop = top; // remembered for logo placement
            const g = labelLayer
              .append('g')
              .datum(n)
              .attr('class', 'sankey-label')
              .attr('data-node', keyOf(n))
              .style('cursor', 'pointer');
            let y = top;
            const localGap = sp.lineGap != null ? sp.lineGap : gap;
            lines.forEach((l) => {
              y += l.size; // baseline of this line
              g.append('text')
                .attr('x', x)
                .attr('y', y)
                .attr('text-anchor', anchor)
                .attr('fill', l.c)
                .attr('font-size', l.size)
                .attr('font-weight', l.w)
                .text(l.t);
              y += localGap;
            });

            if (sp.drawIcons !== false && n.icons && n.icons.length) {
              const sz = n.iconSize || 30;
              const sgap = 10;
              const totalW = n.icons.length * sz + (n.icons.length - 1) * sgap;
              let ix;
              if (side === 'left') ix = n.x0 - pad - totalW;
              else if (side === 'right') ix = n.x1 + pad;
              else ix = cx - totalW / 2;
              const iy = side === 'above' ? top - sz - 12 : y + 10;

              // each icon is a nested <svg> carrying Lucide's inner markup, drawn
              // stroked (handles multi-element icons, not just single paths)
              n.icons.forEach((name, k) => {
                const markup = ICONS[name];
                if (!markup) return;
                labelLayer
                  .append('svg')
                  .datum(n)
                  .attr('class', 'sankey-label sankey-icon')
                  .attr('data-node', keyOf(n))
                  .attr('x', ix + k * (sz + sgap))
                  .attr('y', iy)
                  .attr('width', sz)
                  .attr('height', sz)
                  .attr('viewBox', '0 0 24 24')
                  .attr('fill', 'none')
                  .attr('stroke', n.iconColor || '#3a3f45')
                  .attr('stroke-width', 1.85)
                  .attr('stroke-linecap', 'round')
                  .attr('stroke-linejoin', 'round')
                  .style('cursor', 'pointer')
                  .html(markup);
              });
            }
          });

          iconLayout.forEach((ic) => {
            const { n } = ic;
            const icons = ic.names || n.icons || [];
            const sizes = ic.sizes || [];
            let x = ic.x;
            icons.forEach((name, k) => {
              const markup = ICONS[name];
              if (!markup) return;
              const sz = sizes[k] || ic.size || n.iconSize || 30;
              labelLayer
                .append('svg')
                .datum(n)
                .attr('class', 'sankey-label sankey-icon')
                .attr('data-node', keyOf(n))
                .attr('x', x)
                .attr('y', ic.y)
                .attr('width', sz)
                .attr('height', sz)
                .attr('viewBox', '0 0 24 24')
                .attr('fill', 'none')
                .attr('stroke', ic.color || n.iconColor || '#3a3f45')
                .attr('stroke-width', ic.strokeWidth || 1.85)
                .attr('stroke-linecap', 'round')
                .attr('stroke-linejoin', 'round')
                .style('cursor', 'pointer')
                .html(markup);
              x += sz + (ic.gap || 10);
            });
          });

          /* ---------- hub logo (optional) ---------- *
           * sits in the top headroom, centred over the hub column, above the
           * hub's "above" text label. */
          if (meta.logoSvg) {
            const hub = graph.nodes.find((n) => n.type === 'hub') || graph.nodes[0];
            const lw = meta.logoWidth || 150;
            const lh = meta.logoHeight || 86;
            const lx = (hub.x0 + hub.x1) / 2 - lw / 2;
            // sit just above the hub's text label, clamped below the title
            const labelTop = hub._labelTop != null ? hub._labelTop : cfg.margin.top;
            const ly = meta.logoY != null ? meta.logoY : Math.max(86, labelTop - lh - 10);
            const lg = svg.append('g').attr('transform', `translate(${lx},${ly})`);
            lg.append('svg')
              .attr('width', lw)
              .attr('height', lh)
              .attr('viewBox', meta.logoViewBox || '0 0 150 86')
              .attr('overflow', 'visible')
              .html(meta.logoSvg);
          }

          /* ---------- title block ---------- */
          if (meta.title) {
            const title = svg
              .append('text')
              .attr('x', meta.titleX != null ? meta.titleX : W / 2)
              .attr('y', meta.titleY || 120)
              .attr('text-anchor', 'middle')
              .attr('font-size', meta.titleSize || 142)
              .attr('font-weight', 800)
              .attr('letter-spacing', '0')
              .attr('fill', cfg.titleColor)
              .text(meta.title);
            if (meta.titleTextLength) {
              title
                .attr('textLength', meta.titleTextLength)
                .attr('lengthAdjust', meta.titleLengthAdjust || 'spacingAndGlyphs');
            }
          }

          /* ---------- period stamp (top-right corner, clear of nodes) ---------- */
          if (meta.period || meta.periodNote) {
            const px = meta.periodX != null ? meta.periodX : W - 210;
            const periodY = meta.periodY != null ? meta.periodY : 222;
            const periodNoteY = meta.periodNoteY != null ? meta.periodNoteY : 276;
            const tg = svg.append('g');
            if (meta.period)
              tg.append('text')
                .attr('x', px)
                .attr('y', periodY)
                .attr('text-anchor', 'middle')
                .attr('font-size', 38)
                .attr('font-weight', 700)
                .attr('fill', cfg.subtitleColor)
                .text(meta.period);
            if (meta.periodNote)
              tg.append('text')
                .attr('x', px)
                .attr('y', periodNoteY)
                .attr('text-anchor', 'middle')
                .attr('font-size', 28)
                .attr('font-weight', 500)
                .attr('fill', cfg.noteColor)
                .text(meta.periodNote);
          }

          const tooltipCfg =
            cfg.interaction && cfg.interaction.tooltip && cfg.interaction.tooltip.enabled
              ? cfg.interaction.tooltip
              : null;
          const linkTooltipLayer = tooltipCfg
            ? svg
                .append('g')
                .attr('class', 'sankey-link-tooltips')
                .attr('aria-hidden', 'true')
                .style('display', 'none')
                .style('pointer-events', 'none')
                .style('filter', 'drop-shadow(0 2px 6px rgba(0,0,0,0.10))')
            : null;

          function numericLinkValue(lk) {
            const raw = lk.raw || {};
            const v = raw.value != null ? raw.value : lk.value;
            return Number.isFinite(Number(v)) ? Number(v) : 0;
          }

          function linkSum(linksToSum) {
            return (linksToSum || []).reduce((sum, lk) => sum + numericLinkValue(lk), 0);
          }

          function linkPercent(lk) {
            const raw = lk.raw || {};
            if (raw.percentText != null) return String(raw.percentText);
            if (raw.percentageText != null) return String(raw.percentageText);

            const explicit = raw.percent != null ? raw.percent : raw.percentage;
            const decimals = tooltipCfg && tooltipCfg.percentDecimals != null ? tooltipCfg.percentDecimals : 1;
            if (explicit != null && Number.isFinite(Number(explicit))) {
              const pct = Math.abs(Number(explicit)) <= 1 ? Number(explicit) * 100 : Number(explicit);
              return `${trimFixed(pct, decimals)}%`;
            }

            const value = numericLinkValue(lk);
            const sourceLinks = lk.source && lk.source.sourceLinks ? lk.source.sourceLinks : [];
            const targetLinks = lk.target && lk.target.targetLinks ? lk.target.targetLinks : [];
            const sourceTotal = linkSum(sourceLinks);
            const targetTotal = linkSum(targetLinks);
            let denominator = 0;

            if (sourceLinks.length > 1 && sourceTotal > 0) denominator = sourceTotal;
            else if (targetLinks.length > 1 && targetTotal > 0) denominator = targetTotal;
            else denominator = sourceTotal || targetTotal;

            if (!denominator) return '';
            return `${trimFixed((value / denominator) * 100, decimals)}%`;
          }

          function linkTooltipAnchor(path, lk) {
            if (path && isFn(path.getTotalLength) && isFn(path.getPointAtLength)) {
              const length = path.getTotalLength();
              if (Number.isFinite(length) && length > 0) {
                const point = path.getPointAtLength(length / 2);
                return [point.x, point.y];
              }
            }
            return [(lk.source.x1 + lk.target.x0) / 2, (lk.y0 + lk.y1) / 2];
          }

          function showLinkTooltips(items) {
            if (!linkTooltipLayer) return;
            const rows = items
              .map((item) => Object.assign({}, item, { text: linkPercent(item.lk) }))
              .filter((item) => item.text);

            linkTooltipLayer.style('display', rows.length ? null : 'none');
            const tips = linkTooltipLayer
              .selectAll('g.sankey-link-tooltip')
              .data(rows, (item) => item.lk.index);

            tips.exit().remove();

            const entered = tips
              .enter()
              .append('g')
              .attr('class', 'sankey-link-tooltip');
            entered
              .append('rect')
              .attr('fill', tooltipCfg.background)
              .attr('fill-opacity', tooltipCfg.backgroundOpacity)
              .attr('stroke', tooltipCfg.stroke)
              .attr('stroke-opacity', tooltipCfg.strokeOpacity)
              .attr('rx', tooltipCfg.radius);
            entered
              .append('text')
              .attr('font-size', tooltipCfg.fontSize)
              .attr('font-weight', tooltipCfg.fontWeight)
              .attr('fill', tooltipCfg.textColor)
              .attr('letter-spacing', '0');

            const merged = entered.merge(tips);
            merged.each(function (item) {
              const tip = d3.select(this);
              const text = tip
                .select('text')
                .text(item.text)
                .attr('x', tooltipCfg.paddingX)
                .attr('y', 0);
              const textBox = text.node().getBBox();
              const width = textBox.width + tooltipCfg.paddingX * 2;
              const height = textBox.height + tooltipCfg.paddingY * 2;
              const textY = tooltipCfg.paddingY - textBox.y;
              const [ax, ay] = linkTooltipAnchor(item.path, item.lk);
              let x = ax - width / 2;
              let y = ay - height / 2;

              x = Math.max(8, Math.min(W - width - 8, x));
              y = Math.max(8, Math.min(H - height - 8, y));

              tip.select('rect').attr('width', width).attr('height', height);
              text.attr('y', textY);
              tip.attr('transform', `translate(${x},${y})`);
            });
          }

          function showLinkTooltip(path, lk) {
            showLinkTooltips([{ path, lk }]);
          }

          function hideLinkTooltip() {
            if (linkTooltipLayer) {
              linkTooltipLayer.style('display', 'none');
              linkTooltipLayer.selectAll('g.sankey-link-tooltip').remove();
            }
          }

          /* ---------- hover interactions ---------- */
          if (cfg.interaction && cfg.interaction.enabled) {
            const ixn = cfg.interaction;
            const linkPaths = linkLayer.selectAll('path.sankey-link');
            const nodeRects = nodeLayer.selectAll('rect.sankey-node');
            const labelItems = labelLayer.selectAll('.sankey-label');
            const linkPathByIndex = new Map();
            linkPaths.each(function (lk) {
              linkPathByIndex.set(lk.index, this);
            });

            function collectNodeContext(start) {
              const activeNodes = new Set([start]);
              const activeLinks = new Set();
              const upstreamSeen = new Set();
              const downstreamSeen = new Set();

              function upstream(node) {
                const id = keyOf(node);
                if (upstreamSeen.has(id)) return;
                upstreamSeen.add(id);
                (node.targetLinks || []).forEach((lk) => {
                  activeLinks.add(lk);
                  activeNodes.add(lk.source);
                  upstream(lk.source);
                });
              }

              function downstream(node) {
                const id = keyOf(node);
                if (downstreamSeen.has(id)) return;
                downstreamSeen.add(id);
                (node.sourceLinks || []).forEach((lk) => {
                  activeLinks.add(lk);
                  activeNodes.add(lk.target);
                  downstream(lk.target);
                });
              }

              upstream(start);
              downstream(start);
              return { activeNodes, activeLinks };
            }

            function applyHighlight(activeNodes, activeLinks) {
              const activeNodeIds = new Set(Array.from(activeNodes, keyOf));
              const activeLinkIndexes = new Set(Array.from(activeLinks, (lk) => lk.index));
              const dur = ixn.transitionMs;

              linkPaths.filter((lk) => activeLinkIndexes.has(lk.index)).raise();

              linkPaths
                .interrupt()
                .transition()
                .duration(dur)
                .style('stroke-opacity', (lk) =>
                  activeLinkIndexes.has(lk.index) ? ixn.focusOpacity : ixn.dimOpacity
                )
                .style('filter', (lk) =>
                  activeLinkIndexes.has(lk.index) ? 'drop-shadow(0 0 5px rgba(0,0,0,0.22))' : null
                );

              nodeRects
                .interrupt()
                .transition()
                .duration(dur)
                .style('opacity', (n) =>
                  activeNodeIds.has(keyOf(n)) ? ixn.focusOpacity : ixn.nodeDimOpacity
                );

              labelItems
                .interrupt()
                .transition()
                .duration(dur)
                .style('opacity', (n) =>
                  activeNodeIds.has(keyOf(n)) ? ixn.focusOpacity : ixn.labelDimOpacity
                );
            }

            function resetHighlight() {
              const dur = ixn.transitionMs;
              hideLinkTooltip();
              linkPaths
                .interrupt()
                .transition()
                .duration(dur)
                .style('stroke-opacity', cfg.linkOpacity)
                .style('filter', null);
              nodeRects.interrupt().transition().duration(dur).style('opacity', 1);
              labelItems.interrupt().transition().duration(dur).style('opacity', 1);
            }

            const focusNode = (event, n) => {
              const ctx = collectNodeContext(n);
              applyHighlight(ctx.activeNodes, ctx.activeLinks);
              const directLinks = [...(n.targetLinks || []), ...(n.sourceLinks || [])];
              showLinkTooltips(directLinks.map((lk) => ({ path: linkPathByIndex.get(lk.index), lk })));
            };

            const focusLink = (event, lk) => {
              applyHighlight(new Set([lk.source, lk.target]), new Set([lk]));
              showLinkTooltip(event.currentTarget, lk);
            };

            nodeRects.on('mouseenter', focusNode).on('mouseleave', resetHighlight);
            labelItems.on('mouseenter', focusNode).on('mouseleave', resetHighlight);
            linkPaths.on('mouseenter', focusLink).on('mouseleave', resetHighlight);
            svg.on('mouseleave', resetHighlight);
          }

          return svg.node();
        }

        global.SankeyEngine = { render, DEFAULTS };
      })(window);
    </script>
    <script data-inline-source="src/income-statement.js">
      /* ====================================================================
       *  income-statement.js
       *  A convenience layer over the engine: feed plain income-statement
       *  figures and it derives the full node/link graph (the standard
       *  revenue → gross profit → operating profit → net profit topology),
       *  computing every subtotal for you.
       *
       *      const data = SankeyEngine.fromIncomeStatement({
       *        meta: { title: '…', currency: '$', unit: 'B' },
       *        revenue: [
       *          { label: 'Data Center', notes: ['+92% Y/Y'], icons: ['server'],
       *            children: [
       *              { label: 'Hyperscale', value: 37.9, notes: ['+115% Y/Y'] },
       *              { label: ['AI Clouds', '…'], value: 37.4, notes: ['+74% Y/Y'] },
       *            ] },
       *          { label: 'Edge Computing', value: 6.4, notes: ['+29% Y/Y'] },
       *        ],
       *        costOfRevenue: 20.5,
       *        opex: [ { label: 'R&D', value: 6.3 }, { label: 'SG&A', value: 1.3 } ],
       *        tax: 11.6,
       *        otherIncome: [ { label: 'Investments', value: 16.4 } ],
       *        derived: { grossProfit: { notes: ['75% margin'] }, … },
       *      });
       *      SankeyEngine.render('#chart', data);
       * ==================================================================== */
      (function (global) {
        'use strict';

        const num = (x) => (typeof x === 'object' && x !== null ? x.value : x) || 0;
        const sum = (arr, f) => (arr || []).reduce((a, b) => a + f(b), 0);

        function slug(label, i) {
          const base = (Array.isArray(label) ? label.join(' ') : String(label || 'n'))
            .toLowerCase()
            .replace(/&/g, ' and ')
            .replace(/[^a-z0-9]+/g, '_')
            .replace(/^_+|_+$/g, '');
          return (base || 'node') + '_' + i;
        }

        function fromIncomeStatement(spec) {
          const revenue = spec.revenue || [];
          const opex = spec.opex || [];
          const other = spec.otherIncome || [];
          const der = spec.derived || {};

          const cogs = num(spec.costOfRevenue);
          const tax = num(spec.tax);

          // revenue line totals (explicit, else summed from children)
          const lineTotal = (r) => (r.value != null ? r.value : sum(r.children, (c) => num(c)));
          const revenueTotal = sum(revenue, lineTotal);
          const grossProfit = revenueTotal - cogs;
          const opexTotal = sum(opex, (o) => num(o));
          const operatingProfit = grossProfit - opexTotal;
          const otherTotal = sum(other, (o) => num(o));
          const netProfit = operatingProfit - tax + otherTotal;

          // display value for a computed subtotal: explicit override wins, so a
          // node can show a company's reported figure while flows stay conserved
          const dval = (d, computed) => (d && d.value != null ? d.value : computed);

          const hasChildren = revenue.some((r) => (r.children || []).length);
          const cHub = hasChildren ? 2 : 1;

          const nodes = [];
          const links = [];
          const N = (o) => {
            nodes.push(o);
            return o.id;
          };
          const L = (s, t, v) => links.push({ source: s, target: t, value: v });

          // ----- revenue lines (+ optional children) -----
          revenue.forEach((r, i) => {
            const rid = r.id || slug(r.label, 'rev' + i);
            const primary = i === 0; // first line gets the "above" + icon treatment
            N({
              id: rid, col: cHub - 1, order: i, type: 'source',
              labelSide: r.labelSide || (primary ? 'above' : 'left'),
              label: r.label, value: lineTotal(r), notes: r.notes,
              color: r.color, labelColor: r.labelColor,
              icons: r.icons, iconSize: r.iconSize,
            });
            L(rid, 'revenue', lineTotal(r));

            (r.children || []).forEach((c, j) => {
              const cid = c.id || slug(c.label, 'seg' + i + '_' + j);
              N({
                id: cid, col: 0, order: j, type: 'source', labelSide: c.labelSide || 'left',
                label: c.label, value: num(c), notes: c.notes,
                color: c.color, labelColor: c.labelColor, icons: c.icons, iconSize: c.iconSize,
              });
              L(cid, rid, num(c));
            });
          });

          // ----- hub -----
          N({
            id: 'revenue', col: cHub, order: 0, type: 'hub', labelSide: 'above',
            label: (der.revenueHub && der.revenueHub.label) || 'Revenue',
            value: dval(der.revenueHub, revenueTotal), notes: der.revenueHub && der.revenueHub.notes,
          });

          // ----- gross profit / cost of revenue -----
          N({
            id: 'gross_profit', col: cHub + 1, order: 0, type: 'profit', labelSide: 'above',
            label: (der.grossProfit && der.grossProfit.label) || 'Gross profit',
            value: dval(der.grossProfit, grossProfit), notes: der.grossProfit && der.grossProfit.notes,
          });
          L('revenue', 'gross_profit', grossProfit);

          N({
            id: 'cost_of_revenue', col: cHub + 1, order: 1, type: 'cost', labelSide: 'below',
            label: (spec.costOfRevenue && spec.costOfRevenue.label) || ['Cost of', 'revenue'],
            value: cogs, notes: spec.costOfRevenue && spec.costOfRevenue.notes,
          });
          L('revenue', 'cost_of_revenue', cogs);

          // gross profit splits into operating profit + operating expenses
          L('gross_profit', 'operating_profit', operatingProfit);
          L('gross_profit', 'operating_expenses', opexTotal);

          // ----- operating profit / operating expenses / other income -----
          let ord = 0;
          other.forEach((o, i) => {
            const oid = o.id || slug(o.label, 'other' + i);
            N({
              id: oid, col: cHub + 2, order: ord++, type: 'profit', labelSide: o.labelSide || 'above',
              label: o.label, value: num(o), notes: o.notes, color: o.color, labelColor: o.labelColor,
            });
            L(oid, 'net_profit', num(o));
          });

          N({
            id: 'operating_profit', col: cHub + 2, order: ord++, type: 'profit', labelSide: 'above',
            label: (der.operatingProfit && der.operatingProfit.label) || ['Operating', 'profit'],
            value: dval(der.operatingProfit, operatingProfit),
            notes: der.operatingProfit && der.operatingProfit.notes,
          });
          L('operating_profit', 'net_profit', operatingProfit - tax);
          L('operating_profit', 'tax', tax);

          N({
            id: 'operating_expenses', col: cHub + 2, order: ord++, type: 'cost', labelSide: 'below',
            label: (der.operatingExpenses && der.operatingExpenses.label) || ['Operating', 'expenses'],
            value: dval(der.operatingExpenses, opexTotal),
            notes: der.operatingExpenses && der.operatingExpenses.notes,
          });

          // ----- net profit / tax / opex breakdown -----
          let rord = 0;
          N({
            id: 'net_profit', col: cHub + 3, order: rord++, type: 'profit', labelSide: 'right',
            label: (der.netProfit && der.netProfit.label) || ['Net', 'profit'],
            value: dval(der.netProfit, netProfit), notes: der.netProfit && der.netProfit.notes,
          });
          N({
            id: 'tax', col: cHub + 3, order: rord++, type: 'cost', labelSide: 'right',
            label: (spec.tax && spec.tax.label) || 'Tax', value: tax,
            notes: spec.tax && spec.tax.notes,
          });
          opex.forEach((o, i) => {
            const oid = o.id || slug(o.label, 'opex' + i);
            N({
              id: oid, col: cHub + 3, order: rord++, type: 'cost', labelSide: o.labelSide || 'right',
              label: o.label, value: num(o), notes: o.notes,
            });
            L('operating_expenses', oid, num(o));
          });

          return { key: spec.key, name: spec.name, meta: spec.meta || {}, nodes, links };
        }

        const ns = (global.SankeyEngine = global.SankeyEngine || {});
        ns.fromIncomeStatement = fromIncomeStatement;
      })(window);
    </script>

        if (!scrollRoot) return;
        const start = scrollRoot.scrollTop || 0;
        const max = Math.max(0, scrollRoot.scrollHeight - scrollRoot.clientHeight);
        const target = clamp(top, 0, max);
        const distance = target - start;
        if (Math.abs(distance) < 2) return;
        const startedAt = performance.now();
        function tick(now) {
          const progress = clamp((now - startedAt) / duration, 0, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          scrollRoot.scrollTop = start + distance * eased;
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }
      function scrollActiveTableRow(kind = 'statement') {
        if (state.viewMode !== 'table') return;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const row = tableRowFor(kind);
            if (!row) return;
            const contentTop = content.getBoundingClientRect().top;
            const target = content.scrollTop + row.getBoundingClientRect().top - contentTop - 8;
            fastScrollTo(target);
          });
        });
      }
      function timelineColors(record, group) {
        const values = (group?.records || []).map((item) => item.sortValue);
        const min = Math.min(...values);
        const max = Math.max(...values);
        const ratio = max === min ? 1 : (record.sortValue - min) / (max - min);
        const hue = 204;
        const saturation = Math.round(10 + ratio * 63);
        const lightness = Math.round(67 - ratio * 32);
        return {
          dot: `hsl(${hue} ${saturation}% ${lightness}%)`,
          line: `hsl(${hue} ${Math.round(8 + ratio * 35)}% ${Math.round(86 - ratio * 20)}%)`,
          ring: `hsl(${hue} ${Math.round(10 + ratio * 40)}% ${Math.round(80 - ratio * 20)}%)`,
          activeRing: `hsl(${hue} ${Math.round(20 + ratio * 42)}% ${Math.round(88 - ratio * 12)}%)`,
        };
      }
      function renderActiveSummary() {
        const record = currentRecord();
        actionTitle.textContent = record
          ? [record.company, [record.period, record.periodNote].filter(Boolean).join(' - ')].filter(Boolean).join(' · ')
          : t('noDataPointSelected');
      }
      function renderCompanies() {
        const visibleGroups = groups.filter((group) => matches(group.searchText, companySearch.value));
        companyList.innerHTML = '';
        if (!visibleGroups.length) {
          companyList.innerHTML = `<div class="empty-state">${escapeHtml(t('noMatchingCompanies'))}</div>`;
          return;
        }
        visibleGroups.forEach((group) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'nav-item company-item' + (group.company === state.company ? ' active' : '');
          button.setAttribute('role', 'option');
          button.setAttribute('aria-selected', group.company === state.company ? 'true' : 'false');
          button.dataset.company = group.company;
          button.innerHTML = `
            <div class="item-top">
              <span class="item-name">${escapeHtml(group.company)}</span>
              <span class="item-meta">${escapeHtml(t('latest'))} ${escapeHtml(group.latest.period)}</span>
              <span class="count-pill">${group.records.length}</span>
            </div>
          `;
          button.addEventListener('click', () => {
            state.company = group.company;
            const next = sortedRecords(group).find((record) => matches(record.searchText, periodSearch.value)) || sortedRecords(group)[0];
            if (next) {
              state.activeIndex = next.index;
              syncDatasetHash(next);
            }
            renderAll();
            draw();
            scrollActiveTableRow('company');
          });
          companyList.appendChild(button);
        });
      }
      function renderPeriods() {
        const group = groupFor(state.company);
        const visibleRecords = sortedRecords(group).filter((record) => matches(record.searchText, periodSearch.value));
        periodList.innerHTML = '';
        if (!visibleRecords.length) {
          periodList.innerHTML = `<div class="empty-state">${escapeHtml(t('noMatchingTimePoints'))}</div>`;
          return;
        }
        visibleRecords.forEach((record) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'nav-item period-item' + (record.index === state.activeIndex ? ' active' : '');
          button.setAttribute('role', 'option');
          button.setAttribute('aria-selected', record.index === state.activeIndex ? 'true' : 'false');
          button.setAttribute('aria-label', [record.period, record.periodNote || record.label].filter(Boolean).join(', '));
          const colors = timelineColors(record, group);
          button.style.setProperty('--timeline-color', colors.dot);
          button.style.setProperty('--timeline-line-color', colors.line);
          button.style.setProperty('--timeline-ring-color', colors.ring);
          button.style.setProperty('--timeline-active-ring-color', colors.activeRing);
          button.dataset.index = record.index;
          button.innerHTML = `
            <span class="timeline-marker" aria-hidden="true"><span class="timeline-dot"></span></span>
            <span class="timeline-content">
              <span class="item-top">
                <span class="item-name">${escapeHtml(record.period)}</span>
                <span class="item-meta">${escapeHtml(record.periodNote || record.label)}</span>
              </span>
            </span>
          `;
          button.addEventListener('click', () => {
            state.activeIndex = record.index;
            state.company = record.company;
            syncDatasetHash(record);
            renderAll();
            draw();
            scrollActiveTableRow('statement');
          });
          periodList.appendChild(button);
        });
      }
      function renderAll() {
        renderActiveSummary();
        renderCompanies();
        renderPeriods();
        if (state.viewMode === 'table') renderTables();
      }
      function syncViewModeControls() {
        const isTable = state.viewMode === 'table';
        sankeyView.hidden = isTable;
        tableView.hidden = !isTable;
        sankeyActions.hidden = isTable;
        tableActions.hidden = !isTable;
        [...viewMode.querySelectorAll('button')].forEach((button) => {
          const active = button.dataset.view === state.viewMode;
          button.classList.toggle('active', active);
          button.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        syncToolbarHeight();
      }
      function setViewMode(mode, persist = true) {
        if (mode !== 'sankey' && mode !== 'table') return;
        if (state.viewMode === mode) {
          if (mode === 'table') scrollActiveTableRow('statement');
          return;
        }
        state.viewMode = mode;
        if (persist) writeStoredValue(VIEW_MODE_KEY, mode);
        renderAll();
        draw();
        if (mode === 'table') scrollActiveTableRow('statement');
      }

      companySearch.addEventListener('input', renderCompanies);
      periodSearch.addEventListener('input', renderPeriods);
      viewMode.addEventListener('click', (e) => {
        const button = e.target.closest('button');
        if (!button) return;
        setViewMode(button.dataset.view);
      });
      languageToggle.addEventListener('click', () => {
        setLanguage(state.language === 'en' ? 'zh' : 'en');
      });
      themeToggle.addEventListener('click', () => {
        setTheme(state.theme === 'light' ? 'dark' : 'light');
      });
      document.getElementById('periodSort').addEventListener('click', (e) => {
        const button = e.target.closest('button');
        if (!button) return;
        state.sort = button.dataset.sort;
        [...button.parentElement.children].forEach((child) => child.classList.toggle('active', child === button));
        renderPeriods();
      });
      sidebarToggle.addEventListener('click', () => {
        setSidebarCollapsed(!state.sidebarCollapsed);
      });

      let sidebarDrag = null;
      sidebarResizer.addEventListener('pointerdown', (e) => {
        if (!isDesktopLayout() || state.sidebarCollapsed) return;
        sidebarDrag = { pointerId: e.pointerId, x: e.clientX, width: state.sidebarWidth };
        sidebarResizer.setPointerCapture(e.pointerId);
        document.body.classList.add('is-resizing-sidebar');
        e.preventDefault();
      });
      sidebarResizer.addEventListener('pointermove', (e) => {
        if (!sidebarDrag || e.pointerId !== sidebarDrag.pointerId) return;
        applySidebarWidth(sidebarDrag.width + e.clientX - sidebarDrag.x);
      });
      function finishSidebarResize(e) {
        if (!sidebarDrag || e.pointerId !== sidebarDrag.pointerId) return;
        sidebarDrag = null;
        document.body.classList.remove('is-resizing-sidebar');
        applySidebarWidth(state.sidebarWidth, true);
        draw();
      }
      sidebarResizer.addEventListener('pointerup', finishSidebarResize);
      sidebarResizer.addEventListener('pointercancel', finishSidebarResize);
      sidebarResizer.addEventListener('keydown', (e) => {
        if (!isDesktopLayout() || state.sidebarCollapsed) return;
        const bounds = sidebarBounds();
        let nextWidth = state.sidebarWidth;
        if (e.key === 'ArrowLeft') nextWidth -= e.shiftKey ? 48 : 16;
        else if (e.key === 'ArrowRight') nextWidth += e.shiftKey ? 48 : 16;
        else if (e.key === 'Home') nextWidth = bounds.min;
        else if (e.key === 'End') nextWidth = bounds.max;
        else return;
        e.preventDefault();
        applySidebarWidth(nextWidth, true);
        draw();
      });

      function chartWidth(d) {
        return d.render?.width || window.SankeyEngine.DEFAULTS?.width || 2862;
      }
      function draw() {
        syncViewModeControls();
        if (state.viewMode === 'table') {
          renderTables();
          svgBtn.disabled = true;
          return;
        }
        const d = currentDataset();
        const maxWidth = chartWidth(d);
        document.querySelector('.card').style.maxWidth = maxWidth + 'px';
        if (d) window.SankeyEngine.render('#chart', d);
        svgBtn.disabled = !document.querySelector('#chart svg');
      }

      window.addEventListener('hashchange', () => {
        const record = recordFromHash();
        if (!record) return;
        if (record.index === state.activeIndex && record.company === state.company) return;
        state.activeIndex = record.index;
        state.company = record.company;
        renderAll();
        draw();
        scrollActiveTableRow('statement');
      });

      let rt;
      window.addEventListener('resize', () => {
        clearTimeout(rt);
        rt = setTimeout(() => {
          syncResponsiveLayout();
          draw();
        }, 200);
      });

      applyStaticTranslations();
      syncResponsiveLayout();
      renderAll();
      draw();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.body.classList.remove('boot-no-motion');
        });
      });

      /* ---- export ---- */
      const currentSvg = () => document.querySelector('#chart svg');
      function downloadText(filename, text, type = 'text/csv;charset=utf-8') {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([text], { type }));
        a.download = filename;
        a.click();
      }
      function csvCell(value) {
        const text = String(value ?? '').replace(/\r?\n/g, ' ');
        return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
      }
      function csvFromRows(columns, rows) {
        return [
          columns.map((column) => csvCell(column.label)).join(','),
          ...rows.map((row) => columns.map((column) => csvCell(column.value(row))).join(',')),
        ].join('\n') + '\n';
      }
      function svgString() {
        const svg = currentSvg().cloneNode(true);
        svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(svg);
      }
      function dims() {
        const svg = currentSvg();
        if (svg.viewBox && svg.viewBox.baseVal && svg.viewBox.baseVal.width)
          return [svg.viewBox.baseVal.width, svg.viewBox.baseVal.height];
        const r = svg.getBoundingClientRect();
        return [r.width, r.height];
      }
      const fname = () => (currentDataset()?.key || 'sankey') + '-d3';
      svgBtn.onclick = () => {
        if (state.viewMode !== 'sankey' || !currentSvg()) return;
        downloadText(fname() + '.svg', svgString(), 'image/svg+xml');
      };
      pngBtn.onclick = () => {
        if (state.viewMode !== 'sankey' || !currentSvg()) return;
        const [w, h] = dims(); const scale = 2;
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = w * scale; c.height = h * scale;
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          c.toBlob((b) => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = fname() + '.png'; a.click(); });
        };
        img.src = URL.createObjectURL(new Blob([svgString()], { type: 'image/svg+xml' }));
      };
      companiesCsvBtn.onclick = () => {
        const columns = [
          { label: 'company', value: (row) => row.company },
          { label: 'legal_name', value: (row) => row.legalName },
          { label: 'ticker', value: (row) => row.ticker },
          { label: 'exchange', value: (row) => row.exchange },
          { label: 'sector', value: (row) => row.sector },
          { label: 'industry', value: (row) => row.industry },
          { label: 'founded', value: (row) => row.founded },
          { label: 'headquarters', value: (row) => row.headquarters },
          { label: 'fiscal_year_end', value: (row) => row.fiscalYearEnd },
          { label: 'website', value: (row) => row.website },
          { label: 'description', value: (row) => row.description },
          { label: 'dataset_count', value: (row) => row.datasetCount },
          { label: 'latest_period', value: (row) => row.latestPeriod },
          { label: 'source_urls', value: (row) => (row.sourceUrls || []).join(' ') },
        ];
        downloadText('companies.csv', csvFromRows(columns, companyRows()));
      };
      statementsCsvBtn.onclick = () => {
        const columns = [
          { label: 'dataset_key', value: (row) => row.record.dataset.key },
          { label: 'company', value: (row) => row.record.company },
          { label: 'period', value: (row) => row.record.period },
          { label: 'period_note', value: (row) => row.record.periodNote },
          { label: 'currency', value: (row) => row.financial?.currency || '' },
          { label: 'unit', value: (row) => row.financial?.unit || '' },
          { label: 'revenue_total', value: (row) => row.financial?.revenue?.total ?? '' },
          { label: 'revenue_notes', value: (row) => notesText(row.financial?.revenue?.notes) },
          { label: 'revenue_items', value: (row) => describeItems(row.financial?.revenue?.items, row.financial) },
          { label: 'cost_of_revenue', value: (row) => row.financial?.costs?.costOfRevenue?.value ?? '' },
          { label: 'gross_profit', value: (row) => row.financial?.profit?.gross?.value ?? '' },
          { label: 'operating_expenses', value: (row) => row.financial?.costs?.operatingExpenses?.total ?? '' },
          { label: 'operating_expense_items', value: (row) => describeItems(row.financial?.costs?.operatingExpenses?.items, row.financial) },
          { label: 'operating_profit', value: (row) => row.financial?.profit?.operating?.value ?? '' },
          { label: 'other_income', value: (row) => row.financial?.otherIncome?.total ?? 0 },
          { label: 'tax', value: (row) => row.financial?.costs?.tax?.value ?? '' },
          { label: 'net_profit', value: (row) => row.financial?.profit?.net?.value ?? '' },
          { label: 'source_image', value: (row) => row.financial?.sourceImage || '' },
        ];
        downloadText('income-statements.csv', csvFromRows(columns, statementRows()));
      };
    </script>
  </body>
</html>
